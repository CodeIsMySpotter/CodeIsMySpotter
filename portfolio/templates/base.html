<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥷</text></svg>">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

    <header class="max-w-4xl mx-auto px-4 py-6 flex items-center justify-between border-b border-slate-800">
        <div class="flex items-center gap-4">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&h=100&q=80" 
                 alt="My profile" 
                 class="w-12 h-12 rounded-2xl object-cover border-2 border-indigo-500 shadow-md shadow-indigo-500/20">
            <div>
                <h1 class="font-bold text-lg tracking-tight">Bartosz Torzewicz</h1>
                <p class="text-xs text-indigo-400 font-mono">CodeIsMySpotter.rs</p>
            </div>
        </div>
        
        <nav class="flex gap-6 text-sm font-medium text-slate-400">
            <a href="/" class="hover:text-indigo-400 transition-colors">Home</a>
            <a href="/me" class="hover:text-indigo-400 transition-colors">About Me</a>
            <a href="/projects" class="hover:text-indigo-400 transition-colors">Projects</a>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
